; PlatformIO Project Configuration File
;
; SmartESC UART Bridge — ESP32
; Pośrednik między czujnikami (PAS/throttle/brake) + wyświetlaczem S866
; a kontrolerem ESC SmartESC_STM32_v2 (protokół VESC przez UART).
; PCB z projektu bldc_driver_esp32 (bez driverów/mosfetów).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D CORE_DEBUG_LEVEL=2

lib_deps =
